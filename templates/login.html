<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LeavePortal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">

    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">LP</div>
            <div class="auth-logo-text">LeavePortal</div>
        </div>
        
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to manage your leaves & tasks</p>
        
        <!-- Alerts block -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{% if category == 'danger' %}danger{% else %}info{% endif %}" style="padding: 10px 15px; margin-bottom: 20px; font-size: 13px;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label" for="email">Work Email</label>
                <div style="position: relative;">
                    <i class="fa-regular fa-envelope" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           class="form-control" 
                           style="padding-left: 45px;" 
                           placeholder="name@company.com" 
                           required>
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control" 
                           style="padding-left: 45px;" 
                           placeholder="••••••••" 
                           required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">
                Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted); font-weight: 500;">
            New to the portal? <a href="/register" style="font-weight: 700;">Create an account</a>
        </p>
    </div>

</body>
</html>
