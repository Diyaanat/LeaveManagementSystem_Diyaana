<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>
        Welcome, {{ name }}
    </h1>

    <hr>

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h5>Total Leaves</h5>

                    <h2>30</h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h5>Leaves Taken</h5>

                    <h2>0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h5>Remaining Leaves</h5>

                    <h2>30</h2>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
